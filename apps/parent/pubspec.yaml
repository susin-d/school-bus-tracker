name: suraksha
description: SURAKSHA Flutter app for parent
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  flutter_dotenv: ^5.2.1
  table_calendar: ^3.2.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.development
    - .env.production
    - assets/images/
