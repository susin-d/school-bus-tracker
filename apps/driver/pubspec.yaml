name: suraksha_driver
description: SURAKSHA Flutter app for driver operations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.development
    - .env.production
